name: Promote finished games to BotafogoJogos

on:
  push:
    branches: [master]
    paths:
      - 'src/TodosOsJogos/ProximosJogos.js'

jobs:
  promote:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write

    steps:
      - name: Checkout botafogojogos
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run promote script
        run: node scripts/promote-finished-games.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/TodosOsJogos/BotafogoJogos.js src/TodosOsJogos/ProximosJogos.js
          if git diff --cached --quiet; then
            echo "No finished games found — nothing to commit."
          else
            git commit -m "chore: promote finished games from ProximosJogos to BotafogoJogos"
            git push
          fi
